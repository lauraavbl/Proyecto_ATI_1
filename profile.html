<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
    <link rel="icon" sizes="192x192" href="icon/cropped-logonuevo-192x192.png">
    <link rel="stylesheet" href="./css/style.css">
    <script type="text/javascript" src="conf/configES.json" defer></script>
    <script src="./js/profile.js" defer></script>
</head>
<body>
    <header>
        <a class="logo" href="index.html">
            <span></span>
        </a>

        <nav class="nav-search">
            <input class="buscador" type="text" placeholder="Nombre...">
            <button type="button">Buscar</button>
        </nav>

        <div class="user-icon"><img src="icon/userIcon.svg" alt="" class="icono"></div>
        <div class="menu-icon">&#9776;</div>
    </header>
    <section class="main-content">
        <div class="content-img">
            <img class="img-profile" src="" alt="">
        </div>
        <div class="content-info">
            <h1 class="Nombre"></h1>
            <p class="cover-letter">
            </p>
            <table class="bullets">
                <tr>
                    <td id="color favorito"></td>
                    <td id="color_value"></td>
                </tr>
                <tr>
                    <td id="libro favorito"></td>
                    <td id="libro_value"></td>
                </tr>
                <tr>
                    <td id="genero musical"></td>
                    <td id="musica_value"></td>
                </tr>
                <tr>
                    <td id="game fav"></td>
                    <td id="game_fav"></td>
                </tr>
                <tr style="font-weight: bold;">
                    <td id="lenguaje de prog"></td>
                    <td id="lenguaje_value"></td>
                </tr>
            </table>
            
            <p class="bullets" style="margin-top: 15px;">
            </p>
        </div>
    </section>
    <footer>
        <p class="footer"></p>
    </footer>
</body>
</html>
